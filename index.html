<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Song Library — L.I.T. Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'KN Bobohei';
  src:url('assets/fonts/KNBobohei-Bold.ttf') format('truetype');
  font-weight:700;
  font-display:swap;
}
:root{
    --bg:#faf8f3;
    --font-brand:'Changa One', 'Noto Serif SC', serif;
    --surface:#ffffff;
    --surface-raised:#f1efe6;
    --rule:#ddd7c8;
    --text:#262420;
    --text-dim:#79766c;
    --accent:#b8863a;
    --hsk1:#4f8a70;
    --hsk2:#3f6fd1;
    --hsk3:#7c5ec9;
    --hsk4:#c94a70;
    --hsk5:#c85f28;
    --hsk6:#a83440;
    --hsk79:#1f8f83;
    --beyond:#111111;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  header{
    padding:24px 28px;
    border-bottom:1px solid var(--rule);
  }
  .header-inner{
    max-width:1180px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:4px;
  }
  .title{
    font-family:var(--font-brand);
    font-size:28px;
    font-weight:400;
  }
  .about-q{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:50%; border:1px solid var(--rule);
    background:var(--surface); color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:400;
    text-decoration:none; vertical-align:middle; margin-left:6px;
  }
  .about-q:hover{ border-color:var(--accent); color:var(--accent); }
  .creator-link{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    background:none;
    border:1px solid var(--rule);
    border-radius:20px;
    padding:7px 14px;
    cursor:pointer;
    white-space:nowrap;
  }
  .creator-link:hover{ border-color:var(--accent); color:var(--text); }
  .creator-link.active{
    color:var(--accent);
    border-color:var(--accent);
    background:rgba(184,134,58,.1);
  }

  .toolbar{
    max-width:1180px;
    margin:0 auto;
    padding:22px 28px 0;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
  }
  .toolbar-left{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    align-items:center;
    flex:1 1 auto;
  }
  .search{
    flex:1 1 220px;
    max-width:360px;
    position:relative;
  }
  .search input{
    width:100%;
    background:var(--surface);
    border:1px solid var(--rule);
    border-radius:4px;
    padding:10px 14px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:13px;
    outline:none;
  }
  .search input:focus{ border-color:var(--accent); }
  .search input::placeholder{ color:var(--text-dim); }

  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .chip{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.04em;
    padding:7px 13px;
    border-radius:20px;
    border:1px solid var(--rule);
    color:var(--text-dim);
    cursor:pointer;
    background:transparent;
    transition:all .15s;
  }
  .chip:hover{ border-color:var(--accent); color:var(--text); }
  .chip.active{
    background:rgba(184,134,58,.14);
    border-color:var(--accent);
    color:var(--accent);
  }

  .right-controls{
    display:flex;
    gap:16px;
    align-items:center;
    flex-wrap:wrap;
  }
  .view-toggle{
    display:flex;
    border:1px solid var(--rule);
    border-radius:4px;
    overflow:hidden;
  }
  .view-toggle button{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:7px 12px;
    background:transparent;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
  }
  .view-toggle button + button{ border-left:1px solid var(--rule); }
  .view-toggle button.active{
    background:rgba(184,134,58,.14);
    color:var(--accent);
  }

  .sort{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .sort select{
    background:var(--surface);
    border:1px solid var(--rule);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:6px 8px;
    border-radius:4px;
  }

  main{
    max-width:1180px;
    margin:0 auto;
    padding:26px 28px 90px;
  }
  .count-line{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:18px;
  }

  /* GRID VIEW */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:18px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--rule);
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
    text-decoration:none;
    color:var(--text);
    display:flex;
    flex-direction:column;
    transition:transform .15s, border-color .15s;
  }
  .card:hover{
    transform:translateY(-3px);
    border-color:var(--accent);
  }
  .teaser-card{
    cursor:default;
    pointer-events:none;
    opacity:.6;
  }
  .teaser-card:hover{ transform:none; border-color:var(--rule); }
  .teaser-cover{
    height:110px;
    background:repeating-linear-gradient(45deg, var(--surface-raised), var(--surface-raised) 10px, var(--rule) 10px, var(--rule) 11px);
    border-bottom:1px solid var(--rule);
  }
  .teaser-blur{
    filter:blur(4px);
    user-select:none;
  }
  .teaser-date{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--accent);
    letter-spacing:.04em;
    margin-top:2px;
  }
  .cover{
    height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .cover .zh{
    font-family:'KN Bobohei', 'Noto Serif SC', serif;
    font-size:32px;
    font-weight:700;
    color:rgba(0,0,0,.55);
    transition:transform .4s ease;
  }
  .card:hover .cover .zh{ transform:rotate(-6deg) scale(1.06); }
  .status-pill{
    position:absolute;
    top:8px; right:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:3px 7px;
    border-radius:10px;
    background:rgba(0,0,0,.35);
    color:rgba(255,255,255,.85);
  }
  .edit-btn{
    position:absolute;
    bottom:8px; left:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    padding:4px 9px;
    border-radius:10px;
    border:1px solid var(--accent);
    background:rgba(184,134,58,.85);
    color:#fff;
    cursor:pointer;
  }
  .edit-btn:hover{ background:var(--accent); }
  .card-body{
    padding:13px 15px 15px;
    display:flex;
    flex-direction:column;
    gap:7px;
    flex:1;
  }
  .zh-title{
    font-family:'KN Bobohei', 'Noto Serif SC', serif;
    font-size:16px;
    font-weight:600;
  }
  .en-title{
    font-family:'Inter',sans-serif;
    font-size:11px;
    color:var(--text-dim);
    margin-top:-4px;
  }
  .year-chip{
    color:var(--text-dim);
    border:1px solid var(--rule);
    border-radius:8px;
    padding:1px 6px;
    font-size:9px;
    cursor:pointer;
  }
  .year-chip:hover{ border-color:var(--accent); color:var(--accent); }
  .artist{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--text-dim);
    width:fit-content;
    cursor:pointer;
  }
  .artist:hover{ color:var(--accent); text-decoration:underline; }
  .tags{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    margin-top:1px;
  }
  .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    color:var(--text-dim);
    border:1px solid var(--rule);
    padding:2px 7px;
    border-radius:10px;
    cursor:pointer;
  }
  .tag:hover{ border-color:var(--accent); color:var(--accent); }
  .hsk-bar{
    display:flex;
    height:5px;
    border-radius:3px;
    overflow:hidden;
    margin-top:auto;
  }
  .hsk-bar span{ display:block; height:100%; }

  /* LIST / PLAYLIST VIEW */
  .list{
    display:flex;
    flex-direction:column;
    border:1px solid var(--rule);
    border-radius:6px;
    overflow:hidden;
  }
  .row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:11px 16px;
    text-decoration:none;
    color:var(--text);
    background:var(--surface);
    border-bottom:1px solid var(--rule);
    transition:background .12s;
  }
  .row:last-child{ border-bottom:none; }
  .row:hover{ background:var(--surface-raised); }
  .teaser-row{
    display:flex; align-items:center; gap:14px; padding:11px 16px;
    background:var(--surface); border-bottom:1px solid var(--rule);
    cursor:default; opacity:.6;
  }
  .row-index{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    width:20px;
    text-align:right;
    flex-shrink:0;
  }
  .row-swatch{
    width:34px; height:34px;
    border-radius:5px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .row-swatch span{
    font-family:'Noto Serif SC',serif;
    font-size:15px;
    font-weight:700;
  }
  .row-main{
    flex:1 1 auto;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:1px;
  }
  .row-title-line{
    display:flex;
    align-items:baseline;
    gap:8px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .row-zh{
    font-family:'KN Bobohei', 'Noto Serif SC', serif;
    font-size:15px;
    font-weight:600;
  }
  .row-en{
    font-family:'Inter',sans-serif;
    font-size:11px;
    color:var(--text-dim);
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .row-artist{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--text-dim);
    width:fit-content;
    cursor:pointer;
  }
  .row-artist:hover{ color:var(--accent); text-decoration:underline; }
  .row-tags{
    display:none;
    gap:5px;
    flex-shrink:0;
  }
  .row-hsk{
    width:90px;
    flex-shrink:0;
    display:flex;
    height:5px;
    border-radius:3px;
    overflow:hidden;
  }
  .row-hsk span{ display:block; height:100%; }
  .row-status{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--text-dim);
    border:1px solid var(--rule);
    padding:2px 7px;
    border-radius:10px;
    flex-shrink:0;
  }
  .edit-btn-inline{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    padding:3px 8px;
    border-radius:10px;
    border:1px solid var(--accent);
    background:transparent;
    color:var(--accent);
    cursor:pointer;
    flex-shrink:0;
  }
  .edit-btn-inline:hover{ background:rgba(184,134,58,.1); }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
  }

  /* RESPONSIVE */
  @media (min-width: 720px){
    .row-tags{ display:flex; }
  }
  @media (max-width: 640px){
    header{ padding:22px 18px 18px; }
    .title{ font-size:22px; }
    .toolbar{ padding:16px 18px 0; }
    main{ padding:18px 18px 70px; }
    .grid{ grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
    .cover{ height:80px; }
    .cover .zh{ font-size:24px; }
    .card-body{ padding:10px 11px 12px; gap:5px; }
    .row{ padding:9px 12px; gap:10px; }
    .row-index{ display:none; }
    .row-hsk{ width:44px; }
    .row-artist{ display:none; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/auth.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="eyebrow">song library</div>
      <div class="title">
        Lost in Translation Radio
        <a id="aboutLink" class="about-q" href="about.html" title="About">?</a>
      </div>
    </div>
    <button class="creator-link" id="creatorLink">Sign In</button>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="search">
      <input type="text" id="searchInput" placeholder="Search title, artist, or tag…">
    </div>
    <div class="chips" id="statusChips" style="display:none;">
      <button class="chip active" data-status="all">All</button>
      <button class="chip" data-status="published">Published</button>
      <button class="chip" data-status="draft" id="draftChip" style="display:none;">Draft</button>
    </div>
    <a class="creator-link" id="addSongLink" href="creator/add-song.html" style="display:none; text-decoration:none;">+ Add Song</a>
  </div>
  <div class="right-controls">
    <div class="view-toggle" id="viewToggle">
      <button data-view="grid" class="active">Tiles</button>
      <button data-view="list">List</button>
    </div>
    <div class="sort">
      Sort
      <select id="sortSelect">
        <option value="recent">Recently added</option>
        <option value="title">Title (A–Z)</option>
        <option value="year">Year (newest first)</option>
        <option value="difficulty">Difficulty (easy → hard)</option>
      </select>
    </div>
  </div>
</div>

<main>
  <div class="count-line" id="countLine"></div>
  <div class="grid" id="grid"></div>
  <div class="list" id="list" style="display:none;"></div>
  <div class="empty-state" id="emptyState" style="display:none;">No songs match that search.</div>
</main>

<script>
// One lightweight entry per song — this is the ONLY thing the library page needs.
// Full lyric/word data lives in data/songs/song-N.json, loaded by reader.html.
// This whole list is fetched from data/manifest.json rather than hardcoded here,
// so the "Add Song" creator page can update it without anyone touching this file.
let manifest = [];

// --- CREATOR MODE ---
// Creator status is a real database flag (profiles.is_creator), enforced by
// row-level security in Supabase — not a value stored or checked in this file.
let creatorMode = false;
let currentUser = null;

const HSK_VAR = {1:'--hsk1',2:'--hsk2',3:'--hsk3',4:'--hsk4',5:'--hsk5',6:'--hsk6',7:'--hsk79',8:'--hsk79',9:'--hsk79',none:'--beyond'};
const COVER_HUES = ['#4f8a70','#3f6fd1','#7c5ec9','#c94a70','#c85f28'];

let state = { q:'', status:'all', sort:'recent', view: localStorage.getItem('libraryView') || 'grid' };

function coverColor(id){
  let sum = 0;
  for(const ch of id) sum += ch.charCodeAt(0);
  return COVER_HUES[sum % COVER_HUES.length];
}

function computeStats(lines){
  const counts = {};
  let total = 0, diffSum = 0;
  (lines || []).forEach(line => (line.words || []).forEach(w => {
    if(w.h.length === 1 && /[。，！？、；：]/.test(w.h)) return;
    total++;
    const bucket = w.hsk === 0 ? 'none' : (w.hsk >= 7 ? '7' : String(w.hsk));
    counts[bucket] = (counts[bucket] || 0) + 1;
    diffSum += (w.hsk === 0 ? 8 : w.hsk);
  }));
  const pct = {};
  Object.entries(counts).forEach(([k, v]) => { pct[k] = Math.round(v / total * 100); });
  return { hsk: pct, avgDifficulty: total ? Math.round((diffSum / total) * 10) / 10 : 0 };
}

function wireFilterClicks(){
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const val = el.dataset.filter;
      state.q = val;
      document.getElementById('searchInput').value = val;
      syncUrl();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

const initialQ = new URLSearchParams(location.search).get('q');
if(initialQ){
  state.q = initialQ;
  document.getElementById('searchInput').value = initialQ;
}

function matches(song){
  const q = state.q.trim().toLowerCase();
  const inText = !q || [song.zh, song.en, song.artist, song.year, ...song.tags].join(' ').toLowerCase().includes(q);
  const inStatus = state.status === 'all' || song.status === state.status;
  return inText && inStatus;
}

function sortSongs(list){
  const l = [...list];
  if(state.sort === 'title') l.sort((a,b)=> a.en.localeCompare(b.en));
  else if(state.sort === 'year') l.sort((a,b)=> (b.year || 0) - (a.year || 0));
  else if(state.sort === 'difficulty') l.sort((a,b)=> a.avgDifficulty - b.avgDifficulty);
  else l.sort((a,b)=> b.added - a.added);
  return l;
}

function hskBarHTML(hsk){
  return Object.entries(hsk).filter(([,v])=>v>0).map(([k,v])=>
    `<span style="width:${v}%; background:var(${HSK_VAR[k]})"></span>`
  ).join('');
}

function teaserCardHTML(){
  if(!nextRelease || creatorMode) return '';
  const date = new Date(nextRelease).toLocaleDateString(undefined, { month: 'long', day: 'numeric' });
  return `
    <div class="card teaser-card" title="A new song is coming">
      <div class="cover teaser-cover"></div>
      <div class="card-body">
        <div class="zh-title teaser-blur">下一首歌</div>
        <div class="en-title teaser-blur">Coming soon</div>
        <div class="teaser-date">New song — ${date}</div>
      </div>
    </div>
  `;
}

function renderGrid(list){
  document.getElementById('grid').innerHTML = list.map(song => `
    <a class="card" href="reader.html?song=${song.id}">
      <div class="cover" style="background:${coverColor(song.id)}22; border-bottom:1px solid var(--rule); ${song.coverUrl ? `background-image:url('${song.coverUrl}'); background-size:cover; background-position:center;` : ''}">
        ${creatorMode ? `<span class="status-pill">${song.status === 'draft' && song.publishAt && new Date(song.publishAt) > new Date() ? 'scheduled' : song.status}</span>` : ''}
        ${creatorMode ? `<button class="edit-btn" title="Edit this song" onclick="event.preventDefault(); event.stopPropagation(); location.href='creator/add-song.html?edit=${song.id}';">✎ Edit</button>` : ''}
        ${song.coverUrl ? '' : `<div class="zh" style="color:${coverColor(song.id)}">${song.zh.slice(0,2)}</div>`}
      </div>
      <div class="card-body">
        <div class="zh-title">${song.zh}</div>
        <div class="en-title">${song.en}</div>
        <div class="artist" data-filter="${song.artist}">${song.artist}${song.year ? ` <span class="year-chip" data-filter="${song.year}">${song.year}</span>` : ''}</div>
        <div class="tags">${song.tags.map(t=>`<span class="tag" data-filter="${t}">${t}</span>`).join('')}</div>
        <div class="hsk-bar">${hskBarHTML(song.hsk)}</div>
      </div>
    </a>
  `).join('') + teaserCardHTML();
  wireFilterClicks();
}

function teaserRowHTML(){
  if(!nextRelease || creatorMode) return '';
  const date = new Date(nextRelease).toLocaleDateString(undefined, { month: 'long', day: 'numeric' });
  return `
    <div class="row teaser-row" title="A new song is coming">
      <span class="row-index">·</span>
      <div class="row-swatch teaser-cover"></div>
      <div class="row-main">
        <div class="row-title-line">
          <span class="row-zh teaser-blur">下一首歌</span>
          <span class="row-en teaser-blur">Coming soon</span>
        </div>
        <div class="teaser-date">New song — ${date}</div>
      </div>
    </div>
  `;
}

function renderList(list){
  document.getElementById('list').innerHTML = list.map((song, i) => `
    <a class="row" href="reader.html?song=${song.id}">
      <span class="row-index">${i+1}</span>
      <div class="row-swatch" style="background:${coverColor(song.id)}22; ${song.coverUrl ? `background-image:url('${song.coverUrl}'); background-size:cover; background-position:center;` : ''}">
        ${song.coverUrl ? '' : `<span style="color:${coverColor(song.id)}">${song.zh.slice(0,1)}</span>`}
      </div>
      <div class="row-main">
        <div class="row-title-line">
          <span class="row-zh">${song.zh}</span>
          <span class="row-en">${song.en}</span>
        </div>
        <div class="row-artist" data-filter="${song.artist}">${song.artist}${song.year ? ` <span class="year-chip" data-filter="${song.year}">${song.year}</span>` : ''}</div>
      </div>
      <div class="row-tags">${song.tags.map(t=>`<span class="tag" data-filter="${t}">${t}</span>`).join('')}</div>
      <div class="row-hsk">${hskBarHTML(song.hsk)}</div>
      ${creatorMode ? `<span class="row-status">${song.status}</span>` : ''}
      ${creatorMode ? `<button class="edit-btn-inline" title="Edit this song" onclick="event.preventDefault(); event.stopPropagation(); location.href='creator/add-song.html?edit=${song.id}';">✎ Edit</button>` : ''}
    </a>
  `).join('') + teaserRowHTML();
  wireFilterClicks();
}

function render(){
  const filtered = sortSongs(manifest.filter(matches));

  document.getElementById('countLine').textContent =
    `${filtered.length} song${filtered.length===1?'':'s'}`;
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';

  document.getElementById('grid').style.display = state.view === 'grid' ? 'grid' : 'none';
  document.getElementById('list').style.display = state.view === 'list' ? 'flex' : 'none';

  if(state.view === 'grid') renderGrid(filtered);
  else renderList(filtered);

  document.getElementById('draftChip').style.display = creatorMode ? 'inline-block' : 'none';
  document.getElementById('statusChips').style.display = creatorMode ? 'flex' : 'none';
  document.getElementById('addSongLink').style.display = creatorMode ? 'inline-block' : 'none';
}

function syncUrl(){
  const params = new URLSearchParams();
  if(state.q.trim()) params.set('q', state.q.trim());
  const qs = params.toString();
  const newUrl = location.pathname + (qs ? '?' + qs : '');
  history.replaceState(null, '', newUrl);
}

document.getElementById('searchInput').addEventListener('input', e=>{
  state.q = e.target.value;
  syncUrl();
  render();
});
document.getElementById('sortSelect').addEventListener('change', e=>{
  state.sort = e.target.value;
  render();
});
document.querySelectorAll('#statusChips .chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('#statusChips .chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    state.status = chip.dataset.status;
    render();
  });
});
document.querySelectorAll('#viewToggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#viewToggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.view = btn.dataset.view;
    localStorage.setItem('libraryView', state.view);
    render();
  });
});
injectAuthModal();

function refreshCreatorUI(){
  const creatorLink = document.getElementById('creatorLink');
  if(currentUser){
    creatorLink.textContent = 'Sign Out';
    creatorLink.classList.toggle('active', creatorMode);
  } else {
    creatorLink.textContent = 'Sign In';
    creatorLink.classList.remove('active');
  }
  document.getElementById('addSongLink').style.display = creatorMode ? 'inline-block' : 'none';
}

window.onAuthSuccess = async function(user){
  currentUser = user;
  creatorMode = await authIsCreator(user.id);
  refreshCreatorUI();
  render();
};

document.getElementById('creatorLink').addEventListener('click', async () => {
  if(currentUser){
    await authSignOut();
    currentUser = null;
    creatorMode = false;
    refreshCreatorUI();
    render();
  } else {
    openAuthModal();
  }
});

authOnChange(async (user) => {
  currentUser = user;
  creatorMode = user ? await authIsCreator(user.id) : false;
  refreshCreatorUI();
  render();
});

let nextRelease = null;

sb.from('songs').select('*').then(({ data, error }) => {
  if(error){
    document.getElementById('grid').innerHTML =
      '<div class="empty-state">Could not load songs from Supabase</div>';
    console.error(error);
    return;
  }
  manifest = (data || []).map(s => {
    const stats = computeStats(s.lines);
    return {
      id: s.id, zh: s.zh, en: s.en, artist: s.artist, status: s.status,
      tags: s.tags || [], year: s.year || null, publishAt: s.publish_at || null, hsk: stats.hsk, avgDifficulty: stats.avgDifficulty,
      added: new Date(s.added).getTime(), coverUrl: s.cover_url || ''
    };
  });
  render();
});

sb.from('upcoming_releases').select('publish_at').limit(1).then(({ data, error }) => {
  if(error || !data || data.length === 0) return;
  nextRelease = data[0].publish_at;
  render();
});
</script>

  <div style="background:var(--surface); border-radius:10px; width:100%; max-width:720px; max-height:88vh; position:relative; overflow:hidden; display:flex; flex-direction:column;">
    <button id="aboutModalClose" style="position:absolute; top:12px; right:14px; z-index:1; background:var(--surface); border:1px solid var(--rule); border-radius:50%; width:30px; height:30px; cursor:pointer; color:var(--text-dim); font-size:14px;">✕</button>
    <iframe id="aboutModalFrame" style="border:none; width:100%; height:80vh;" title="About"></iframe>
  </div>
</div>

<script>
const aboutLink = document.getElementById('aboutLink');
const aboutOverlay = document.getElementById('aboutModalOverlay');
const aboutFrame = document.getElementById('aboutModalFrame');

function openAboutModal(pushHistory){
  aboutFrame.src = 'about.html?embed=1';
  aboutOverlay.style.display = 'flex';
  if(pushHistory) history.pushState({ about: true }, '', '/about');
}
function closeAboutModal(fromPopstate){
  aboutOverlay.style.display = 'none';
  aboutFrame.src = '';
  if(!fromPopstate) history.back();
}

aboutLink.addEventListener('click', (e) => {
  e.preventDefault();
  openAboutModal(true);
});
document.getElementById('aboutModalClose').addEventListener('click', () => closeAboutModal(false));
aboutOverlay.addEventListener('click', (e) => {
  if(e.target === aboutOverlay) closeAboutModal(false);
});
window.addEventListener('popstate', () => {
  if(location.pathname === '/about'){
    openAboutModal(false);
  } else if(aboutOverlay.style.display === 'flex'){
    closeAboutModal(true);
  }
});
</script>
